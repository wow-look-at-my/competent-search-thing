<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>competent-search-thing</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="bar">
      <div id="query-row">
        <svg
          id="magnifier"
          viewBox="0 0 24 24"
          width="20"
          height="20"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          aria-hidden="true"
        >
          <circle cx="11" cy="11" r="7" />
          <line x1="16.5" y1="16.5" x2="21" y2="21" />
        </svg>
        <span id="bang-chip" class="bang-chip" hidden></span>
        <input
          id="query"
          type="text"
          placeholder="Search files and folders..."
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <div id="results" role="listbox">
        <div id="priority-results"></div>
        <div id="file-results"></div>
        <div id="empty" class="empty" hidden>No matches</div>
        <div id="plugin-results"></div>
      </div>
      <div id="status">
        <span id="status-text">starting...</span>
        <span id="backend-chip" hidden></span>
        <span id="degraded-chip" hidden
          >index may be stale -- periodic rescan advised</span
        >
      </div>
      <div id="stats" hidden>
        <span class="stat"
          ><span class="stat-label">CPU</span
          ><span id="stat-cpu" class="stat-value"></span
        ></span>
        <span class="stat"
          ><span class="stat-label">GPU</span
          ><span id="stat-gpu" class="stat-value"></span
        ></span>
        <span class="stat"
          ><span class="stat-label">RAM</span
          ><span id="stat-ram" class="stat-value"></span
        ></span>
        <span class="stat"
          ><span class="stat-label">SWP</span
          ><span id="stat-swap" class="stat-value"></span
        ></span>
        <span class="stat"
          ><span class="stat-label">NET</span
          ><span id="stat-net" class="stat-value"></span
        ></span>
      </div>
      <div id="preview-pane">
        <div id="preview-spinner" class="preview-spinner" hidden></div>
        <div id="preview-body" class="preview-body"></div>
        <div id="preview-strip" class="preview-strip">
          <span id="preview-flash" class="preview-flash" hidden></span>
          <button id="preview-web-btn" class="preview-btn" type="button">
            Search web (Ctrl+K)
          </button>
          <button id="preview-ai-btn" class="preview-btn" type="button">
            Ask AI (Ctrl+I)
          </button>
        </div>
      </div>
      <div id="config-pane">
        <div id="config-header">
          <span id="config-title">Settings</span>
          <input
            id="config-filter"
            type="text"
            placeholder="Filter settings..."
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <div id="config-notices"></div>
        <div id="config-main">
          <nav id="config-toc" aria-label="Settings sections"></nav>
          <div id="config-body"></div>
        </div>
        <div id="config-strip">
          <span id="config-flash" class="config-flash" hidden></span>
          <span id="config-dirty-note" hidden>unsaved changes</span>
          <button id="config-open-file-btn" class="config-btn" type="button">
            Open config.json
          </button>
          <button id="config-close-btn" class="config-btn" type="button">
            Close
          </button>
          <button id="config-save-btn" class="config-btn" type="button">
            Save (Ctrl+S)
          </button>
        </div>
      </div>
    </div>

    <template id="tpl-icon-folder">
      <svg
        class="icon"
        viewBox="0 0 24 24"
        width="16"
        height="16"
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
      </svg>
    </template>
    <template id="tpl-icon-file">
      <svg
        class="icon"
        viewBox="0 0 24 24"
        width="16"
        height="16"
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M6 2h8l4 4v14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2z" />
        <path d="M14 2v4h4" />
      </svg>
    </template>
    <template id="tpl-plugin-section">
      <div class="plugin-section">
        <div class="plugin-section-header"></div>
      </div>
    </template>
    <template id="tpl-plugin-row">
      <div class="result plugin-row" role="option">
        <div class="plugin-main">
          <span class="plugin-icon"></span>
          <span class="name plugin-title"></span>
          <span class="plugin-subtitle"></span>
          <span class="plugin-badge" hidden></span>
        </div>
        <div class="plugin-fields" hidden></div>
      </div>
    </template>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
