name: CI

on:
  push:

permissions:
  id-token: write
  contents: read
  # actions: read lets go-toolchain's autorelease step download the go-build
  # run artifact it publishes to buildhost.
  actions: read

jobs:
  all-builds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux webview build dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libx11-dev xvfb xdotool imagemagick x11-utils openbox

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Keep the version stamp clean for published binaries
        # go-toolchain injects a transient gomemlimit_gen.go during the build;
        # as an untracked file it would make Go's VCS stamping mark every
        # published binary vcs.modified (+dirty). .git/info/exclude is local
        # to the checkout and never committed.
        run: echo gomemlimit_gen.go >> .git/info/exclude

      - uses: wow-look-at-my/go-toolchain@v1
        env:
          # desktop,production are Wails v2's manual-build tags: without them
          # the binary is a stub that exits immediately, and the screenshot
          # step below actually runs the built app.
          GOFLAGS: "-tags=webkit2_41,desktop,production"
        with:
          # linux/amd64 is the only cgo (gtk/webkit) target; windows/amd64
          # cross-compiles pure-Go from this runner (Wails uses WebView2 on
          # windows, and Go auto-disables cgo for non-host targets). darwin
          # needs cgo against the Apple SDK, so it cannot be built here.
          targets: linux/amd64,windows/amd64
          cgo: 'true'
          # Publish the binaries built above (with the GOFLAGS tags) to
          # buildhost on every push: project competent-search-thing (the app)
          # plus competent-search-thing/server (the color-http example).
          autorelease: 'true'
          timeout: '20'

      - name: Capture UI screenshots under Xvfb
        uses: wow-look-at-my/actions@typescript#latest
        with:
          file: .github/scripts/screenshots.ts

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.sha }}
          path: screenshots/
          if-no-files-found: warn
