name: CI

on:
  push:

permissions:
  # id-token lets the buildhost actions (the deb steps and the publish job)
  # mint the OIDC token they authenticate to pazer.build with.
  id-token: write
  # contents: write is required by go-toolchain's dependency-graph
  # submission (a 403 from the Dependency Submission API fails the build).
  contents: write
  actions: read

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux webview build dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libx11-dev xvfb xdotool imagemagick x11-utils openbox

      - name: Build frontend
        working-directory: frontend
        # npm test is the vitest DOM-ordering gate (priority sections
        # above file rows + the flat selection rules).
        run: npm ci && npm run build && npm test

      - uses: wow-look-at-my/go-toolchain@v1
        env:
          GOFLAGS: "-tags=webkit2_41,desktop,production"
        with:
          targets: linux/amd64,windows/amd64
          cgo: 'true'
          timeout: '20'
          # The dedicated publish job is the SINGLE publish path. The
          # action DEFAULTS autorelease to 'true', so it must be pinned
          # off explicitly or this job publishes all of build/ (incl.
          # the example color-http server binary) to buildhost itself.
          autorelease: 'false'

      - name: Hand off the linux binary to the publish job
        # Org-standard cache-backed hand-off (the wow-look-at-my/actions
        # cache-upload/cache-download trio) -- this org does not use the
        # GitHub artifact service for job hand-offs. Only the app binaries
        # ride to the publish job; the example color-http server binaries
        # also land in build/ but are a dev sample, not a published
        # deliverable. Distinct hand-off names keep the cache keys
        # (cache-xfer-<name>-<run_id>-<run_attempt>) collision-free across
        # jobs.
        uses: wow-look-at-my/actions@cache-upload#latest
        with:
          name: app-linux-amd64
          path: build/competent-search-thing_linux_amd64

      - name: Hand off the windows binary to the publish job
        uses: wow-look-at-my/actions@cache-upload#latest
        with:
          name: app-windows-amd64
          path: build/competent-search-thing_windows_amd64.exe

      - name: Build Debian package (carries runtime lib Depends)
        # buildhost's on-the-fly deb repackaging cannot declare package
        # dependencies (its control file is Package/Version/Arch/Maintainer/
        # Description only -- internal/repackage/deb.go), so a raw-binary or
        # apt.pazer.build install lands without WebKitGTK and fails at the
        # loader on any machine that never had the build deps. Build a real
        # .deb here instead: same binary, plus a Depends line derived from the
        # binary's direct NEEDED libs (objdump -p), package names verified on
        # Ubuntu 24.04 and 22.04 (noble's t64 packages Provide the unsuffixed
        # names, so one line covers both; glibc floor is GLIBC_2.34).
        uses: wow-look-at-my/actions@typescript#latest
        with:
          script: |
            const bin = "build/competent-search-thing_linux_amd64";
            if (!fs.existsSync(bin)) throw new Error(`missing ${bin} -- did the go-toolchain build layout change?`);
            const version = `0.${github.run_number}+g${github.sha.slice(0, 7)}`;
            const root = path.join(process.env.RUNNER_TEMP ?? os.tmpdir(), "debroot");
            fs.mkdirSync(path.join(root, "DEBIAN"), { recursive: true });
            fs.mkdirSync(path.join(root, "usr/bin"), { recursive: true });
            fs.copyFileSync(bin, path.join(root, "usr/bin/competent-search-thing"));
            fs.chmodSync(path.join(root, "usr/bin/competent-search-thing"), 0o755);
            const control = [
              "Package: competent-search-thing",
              `Version: ${version}`,
              "Section: utils",
              "Priority: optional",
              "Architecture: amd64",
              "Depends: libwebkit2gtk-4.1-0, libgtk-3-0, libglib2.0-0, libgdk-pixbuf-2.0-0, libsoup-3.0-0, libjavascriptcoregtk-4.1-0, libc6 (>= 2.34)",
              "Maintainer: wow-look-at-my <https://github.com/wow-look-at-my/competent-search-thing>",
              "Description: Instant cross-platform desktop file searchbar",
              " Spotlight-style searchbar with Everything-style speed, built with Go,",
              " Wails v2 and the system WebKitGTK webview.",
              "",
            ].join("\n");
            fs.writeFileSync(path.join(root, "DEBIAN/control"), control);
            await $`dpkg-deb --build --root-owner-group ${root} build/competent-search-thing.deb`;
            await $`dpkg-deb --info build/competent-search-thing.deb`;

      - name: Create buildhost release for the deb
        id: deb_release
        uses: wow-look-at-my/buildhost/.github/actions/buildhost-create-release@master
        with:
          project: competent-search-thing/deb

      - name: Upload deb to buildhost
        uses: wow-look-at-my/buildhost/.github/actions/buildhost-upload-artifact@master
        with:
          project: competent-search-thing/deb
          version: ${{ steps.deb_release.outputs.version }}
          os: linux
          arch: amd64
          path: build/competent-search-thing.deb
          kind: archive
          filename: competent-search-thing.deb

      - name: Publish buildhost deb release
        uses: wow-look-at-my/buildhost/.github/actions/buildhost-publish-release@master
        with:
          project: competent-search-thing/deb
          version: ${{ steps.deb_release.outputs.version }}

      - name: Capture UI screenshots under Xvfb
        uses: wow-look-at-my/actions@typescript#latest
        with:
          file: .github/scripts/screenshots.ts

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.sha }}
          path: screenshots/
          if-no-files-found: warn

  darwin:
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - uses: wow-look-at-my/go-toolchain@v1
        env:
          GOFLAGS: "-tags=desktop,production"
        with:
          targets: darwin/arm64
          cgo: 'true'
          timeout: '30'
          # Same pinning as the linux job: the publish job is the single
          # publish path, and the action defaults autorelease to 'true'.
          autorelease: 'false'

      - name: GUI smoke (window + IPC round-trip)
        # HARD GATE: a smoke failure fails the darwin job (and with it
        # the required all-builds status). Every SMOKE id in the script
        # is a hard pass/fail; screenshots are evidence, not checks.
        uses: wow-look-at-my/actions@typescript#latest
        with:
          file: .github/scripts/darwin-smoke.ts

      - name: Upload smoke screenshots
        # Mirrors the linux job's Xvfb screenshots artifact: the smoke
        # script drops its best-effort captures in smoke-shots/ at the
        # workspace root. ignore (not warn): a failure before any
        # capture -- or a TCC-restricted screencapture -- legitimately
        # leaves nothing to upload, and the smoke step itself is the
        # gate.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: darwin-smoke-${{ github.sha }}
          path: smoke-shots/
          if-no-files-found: ignore

      - name: Hand off the darwin binary to the publish job
        # Same org-standard cache hand-off the linux job uses.
        uses: wow-look-at-my/actions@cache-upload#latest
        with:
          name: app-darwin-arm64
          path: build/competent-search-thing_darwin_arm64

  publish:
    # ONE buildhost release per push, carrying every platform CI actually
    # builds, so the app project's "latest" download is always a complete
    # set. Runs on every branch unconditionally: branch pushes create
    # branch releases (?branch=<name> downloads), while the bare "latest"
    # URL only ever follows the default branch -- guaranteed by buildhost.
    # The buildhost actions mint their own OIDC token (audience
    # https://pazer.build) from the workflow's id-token: write grant.
    # Deliberately NOT restored from the pre-#25 autorelease era: the
    # color-http example server binary (project competent-search-thing/
    # server) -- a dev sample, not a user-facing deliverable.
    needs: [linux, darwin]
    runs-on: ubuntu-latest
    steps:
      - name: Download the linux binary hand-off
        # Single-file hand-offs restore as <dest>/<basename>, so the three
        # binaries land in binaries/ under their build/ names. A missing
        # hand-off fails the job loudly (fail-if-missing defaults true),
        # and on a "re-run failed jobs" the restore-keys prefix picks up
        # the earlier attempt's uploads.
        uses: wow-look-at-my/actions@cache-download#latest
        with:
          name: app-linux-amd64
          path: binaries

      - name: Download the windows binary hand-off
        uses: wow-look-at-my/actions@cache-download#latest
        with:
          name: app-windows-amd64
          path: binaries

      - name: Download the darwin binary hand-off
        uses: wow-look-at-my/actions@cache-download#latest
        with:
          name: app-darwin-arm64
          path: binaries

      - name: Create buildhost release
        id: release
        uses: wow-look-at-my/buildhost/.github/actions/buildhost-create-release@master
        with:
          project: competent-search-thing
          create_service: 'true'

      - name: Upload linux/amd64 binary
        uses: wow-look-at-my/buildhost/.github/actions/buildhost-upload-artifact@master
        with:
          project: competent-search-thing
          version: ${{ steps.release.outputs.version }}
          os: linux
          arch: amd64
          path: binaries/competent-search-thing_linux_amd64
          filename: competent-search-thing

      - name: Upload windows/amd64 binary
        uses: wow-look-at-my/buildhost/.github/actions/buildhost-upload-artifact@master
        with:
          project: competent-search-thing
          version: ${{ steps.release.outputs.version }}
          os: windows
          arch: amd64
          path: binaries/competent-search-thing_windows_amd64.exe
          filename: competent-search-thing.exe

      - name: Upload darwin/arm64 binary
        uses: wow-look-at-my/buildhost/.github/actions/buildhost-upload-artifact@master
        with:
          project: competent-search-thing
          version: ${{ steps.release.outputs.version }}
          os: darwin
          arch: arm64
          path: binaries/competent-search-thing_darwin_arm64
          filename: competent-search-thing

      - name: Publish buildhost release
        uses: wow-look-at-my/buildhost/.github/actions/buildhost-publish-release@master
        with:
          project: competent-search-thing
          version: ${{ steps.release.outputs.version }}
